<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>Jumpgate</title>
<style>
 body{margin:0;background:#05070f;color:#cfe9ee;font-family:Inter,system-ui,sans-serif;padding:20px;text-align:center}
 h1{font-family:Orbitron,sans-serif;color:#4dd0e1;font-size:17px}
 #stage{position:relative;width:512px;height:512px;margin:14px auto}
 #stage img{position:absolute;left:0;top:0;width:512px;height:512px}
 #vortex{mix-blend-mode:screen;transform-origin:center}
 #flash{position:absolute;left:0;top:0;width:512px;height:512px;border-radius:50%;
   background:radial-gradient(circle,#fff 0%,rgba(140,230,255,.6) 30%,transparent 65%);opacity:0;pointer-events:none}
 #ship{position:absolute;left:50%;top:50%;width:46px;height:46px;margin:-23px 0 0 -23px;border-radius:50%;
   background:radial-gradient(circle,#dffaff 0%,#4dd0e1 55%,transparent 78%);transform-origin:center;opacity:0;pointer-events:none}
 button{background:#12222e;color:#4dd0e1;border:1px solid #4dd0e1;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:14px}
 .hint{color:#7e9398;font-size:12px;margin-top:8px}
</style></head><body>
 <h1>Джампгейт — idle (кольцо) → активация 3с (вихрь) → прыжок</h1>
 <div id="stage">
   <img id="vortex" src="jumpgate_vortex.png">
   <img id="ring" src="jumpgate_ring.png">
   <div id="ship"></div>
   <div id="flash"></div>
 </div>
 <button id="go">▶ Подлёт → активация → прыжок</button>
 <div class="hint">idle: только кольцо · активация: вихрь открывается 3 сек · прыжок: корабль ныряет в центр + вспышка → вихрь гаснет. vortex scale 0.52.</div>
<script>
 const V=document.getElementById('vortex'), F=document.getElementById('flash'), SHIP=document.getElementById('ship');
 const BASE=0.52, OPEN_MS=3000, SPIN=120;   // SPIN — макс скорость вращения вихря, °/сек
 let angle=0, t0=null, phase='idle', pT=0;
 document.getElementById('go').onclick=()=>{ if(phase==='idle'){ phase='opening'; pT=performance.now(); } };
 function frame(t){
   if(t0===null)t0=t; const dt=(t-t0)/1000; t0=t; const e=t-pT;
   let alpha=0, scale=BASE, spin=0, ship=0, flash=0;
   if(phase==='opening'){                       // вихрь ПОЯВЛЯЕТСЯ СРАЗУ, затем 3 сек раскручивается
     const k=Math.min(1,e/OPEN_MS);
     alpha=0.92; scale=BASE; spin=SPIN*k;        // alpha/scale сразу полные; spin 0→max за 3 сек
     if(k>=1){ phase='jump'; pT=t; }
   } else if(phase==='jump'){                    // корабль ныряет в центр + вспышка
     alpha=0.92; scale=BASE; spin=SPIN;
     ship=Math.max(0,1-e/420);
     flash=(e<140)?e/140:Math.max(0,1-(e-140)/240);
     if(e>540){ phase='closing'; pT=t; }
   } else if(phase==='closing'){                 // вихрь гаснет → idle
     const k=Math.min(1,e/450);
     alpha=0.92*(1-k); scale=BASE*(1-0.5*k); spin=SPIN*(1-k);
     if(k>=1) phase='idle';
   }
   angle=(angle+spin*dt)%360;
   V.style.opacity=alpha;
   V.style.transform=`rotate(${angle}deg) scale(${scale})`;
   F.style.opacity=flash;
   SHIP.style.opacity=ship>0?1:0;
   SHIP.style.transform=`scale(${ship})`;
   requestAnimationFrame(frame);
 }
 requestAnimationFrame(frame);
</script></body></html>
