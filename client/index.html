<html lang="ru">
<head>

  <title>Stellar Drift — прототип</title>
  <link rel="icon" href="data:," />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #05070f; overflow: hidden; }
    #game { width: 100vw; height: 100vh; }

      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      color: #4dd0e1; font-family: 'Orbitron', system-ui, sans-serif; letter-spacing: 2px;
      font-size: 20px; z-index: 10; pointer-events: none;
    }
  </style>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=block" rel="stylesheet">

  <div id="loading">STELLAR DRIFT…</div>
  <div id="game"></div>
